<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miracle Chain Dashboard</title>
    <style>
        :root {
            --primary: #037DD6;
            --bg: #0b0e11;
            --card: #161a1e;
            --text: #ffffff;
            --text-dim: #929aa5;
            --success: #02c076;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: var(--bg); color: var(--text);
        }

        .container { 
            text-align: center; padding: 40px; background: var(--card); 
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            width: 100%; max-width: 380px; border: 1px solid #2b3139;
            transition: transform 0.3s ease;
        }

        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 12px; border-radius: 20px; background: #2b3139;
            font-size: 12px; margin-bottom: 20px; color: var(--text-dim);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #474d57; }
        .dot.connected { background: var(--success); box-shadow: 0 0 10px var(--success); }

        h1 { font-size: 28px; margin: 10px 0; letter-spacing: -0.5px; }
        p { color: var(--text-dim); margin-bottom: 30px; font-size: 15px; line-height: 1.6; }

        .balance-card {
            background: #2b3139; padding: 20px; border-radius: 16px; 
            margin-bottom: 30px; display: none;
        }

        .pnic-value { font-size: 32px; font-weight: 700; color: var(--text); }
        .pnic-symbol { font-size: 16px; color: var(--primary); margin-left: 4px; }

        .btn-main {
            background: var(--primary); color: white; border: none; 
            padding: 16px 32px; font-size: 16px; font-weight: 600; 
            border-radius: 12px; cursor: pointer; transition: 0.2s; width: 100%;
        }

        .btn-main:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-main:active { transform: translateY(0); }

        .footer-link { margin-top: 20px; display: block; color: var(--primary); font-size: 13px; text-decoration: none; opacity: 0.8; }
        .footer-link:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-badge">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">Wallet Disconnected</span>
    </div>

    <h1>Miracle Chain</h1>
    <p>The official gateway to Miracle Mainnet. Add the network and track your PNIC assets.</p>
    
    <div id="balanceCard" class="balance-card">
        <div style="font-size: 12px; color: var(--text-dim); text-transform: uppercase;">Current Balance</div>
        <div class="pnic-value"><span id="pnicAmount">0.00</span><span class="pnic-symbol">PNIC</span></div>
    </div>

    <button id="mainBtn" class="btn-main" onclick="handleInteraction()">Connect Wallet</button>

    <a href="https://miracle-rpc.calderaexplorer.xyz/" target="_blank" class="footer-link">View Block Explorer →</a>
</div>

<script>
const CHAIN_ID_HEX = '0x4DF'; 

async function handleInteraction() {
    if (typeof window.ethereum === 'undefined') {
        alert('MetaMask is not installed!');
        return;
    }

    try {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        const account = accounts[0];
        
        // Update UI status
        document.getElementById('statusDot').classList.add('connected');
        document.getElementById('statusText').innerText = `Connected: ${account.substring(0,6)}...${account.substring(38)}`;

        // Attempt Network Switch/Add
        try {
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: CHAIN_ID_HEX }],
            });
        } catch (err) {
            if (err.code === 4902) {
                await window.ethereum.request({
                    method: 'wallet_addEthereumChain',
                    params: [{
                        chainId: CHAIN_ID_HEX,
                        chainName: 'Miracle Chain Mainnet',
                        nativeCurrency: { name: 'PNIC', symbol: 'PNIC', decimals: 18 },
                        rpcUrls: ['https://miracle-rpc.calderachain.xyz/http'],
                        blockExplorerUrls: ['https://miracle-rpc.calderaexplorer.xyz/']
                    }],
                });
            }
        }

        // Fetch Balance
        const balanceHex = await window.ethereum.request({
            method: 'eth_getBalance',
            params: [account, 'latest'],
        });

        const wei = parseInt(balanceHex, 16);
        const pnic = (wei / 1e18).toFixed(4);

        document.getElementById('pnicAmount').innerText = pnic;
        document.getElementById('balanceCard').style.display = 'block';
        document.getElementById('mainBtn').innerText = 'Refresh Data';

    } catch (error) {
        console.error("User denied access or error occurred", error);
    }
}
</script>

</body>
</html>
