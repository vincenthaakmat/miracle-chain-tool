<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miracle Chain Dashboard | By Vincent Haakmat</title>
    <style>
        :root {
            --primary: #037DD6;
            --secondary: #2b3139;
            --bg: #0b0e11;
            --card: #161a1e;
            --text: #ffffff;
            --text-dim: #929aa5;
            --success: #02c076;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; background-color: var(--bg); color: var(--text);
            padding: 20px;
        }

        .container { 
            text-align: center; padding: 40px; background: var(--card); 
            border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); 
            width: 100%; max-width: 400px; border: 1px solid #2b3139;
            position: relative; overflow: hidden;
        }

        #successBanner {
            display: none; background: var(--success); color: white;
            font-size: 11px; font-weight: bold; padding: 8px;
            position: absolute; top: 0; left: 0; width: 100%; letter-spacing: 1px;
        }

        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 12px; border-radius: 20px; background: var(--secondary);
            font-size: 12px; margin-bottom: 20px; color: var(--text-dim);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #474d57; }
        .dot.connected { background: var(--success); box-shadow: 0 0 10px var(--success); }

        .gift-tag { color: var(--success); font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        
        h1 { margin: 10px 0; font-size: 24px; }

        .balance-card {
            background: var(--secondary); padding: 24px; border-radius: 16px; 
            margin: 20px 0; display: none; border: 1px solid #333;
        }

        .price-tag {
            font-size: 12px; color: var(--success); font-weight: 600;
            background: rgba(2, 192, 118, 0.1); padding: 4px 8px;
            border-radius: 6px; display: inline-block; margin-bottom: 10px;
            text-decoration: none;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .btn-main {
            background: var(--primary); color: white; border: none; 
            padding: 16px; font-size: 16px; font-weight: 600; 
            border-radius: 12px; cursor: pointer; transition: 0.3s;
        }

        .price-tag:hover { opacity: 0.9; }

        .btn-main.success-state { background: var(--success); cursor: default; }

        .btn-secondary, .btn-history {
            background: transparent; color: var(--text); border: 1px solid var(--secondary); 
            padding: 12px; font-size: 14px; font-weight: 500; 
            border-radius: 12px; cursor: pointer; display: none; text-decoration: none;
            transition: 0.2s;
        }

        .author-section { margin-top: 30px; padding-top: 20px; border-top: 1px solid #2b3139; text-align: left; }
        .author-name { font-weight: 600; font-size: 14px; color: var(--text); }
        .author-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div id="successBanner">✓ MIRACLE CHAIN ACTIVE</div>
    
    <div class="status-badge">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">Wallet Disconnected</span>
    </div>

    <span class="gift-tag">🎁 Community Gift</span>
    <h1>Miracle Chain</h1>
    
    <div id="balanceCard" class="balance-card">
        <a id="pnicPriceDisplay" class="price-tag" href="https://coinmarketcap.com/currencies/phoenic/" target="_blank" rel="noreferrer">PNIC: Loading...</a>
        <div style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin-top: 5px;">Your Balance</div>
        <div style="font-size: 32px; font-weight: 700; margin: 5px 0;">
            <span id="pnicAmount">0.00</span><span style="font-size: 16px; color: var(--primary); margin-left: 4px;">PNIC</span>
        </div>
        <div id="usdValue" style="font-size: 14px; color: var(--text-dim);">$0.00 USD</div>
    </div>

    <div class="btn-group">
        <button id="mainBtn" class="btn-main" onclick="handleInteraction()">Connect & Add Network</button>
        <a id="historyBtn" class="btn-history" href="#" target="_blank">View History on Explorer</a>
        <button id="switchEthBtn" class="btn-secondary" onclick="switchToEthereum()">Back to Ethereum</button>
    </div>

    <div class="author-section">
        <div class="author-name">Vincent Haakmat</div>
        <div class="author-desc">Software Developer Consultant & Enthusiast. Created for the Bellator/Metaterra community.</div>
    </div>
</div>

<script>
const MIRACLE_CHAIN_ID = '0x4DF'; 
const EXPLORER_URL = 'https://miracle-rpc.calderaexplorer.xyz/address/';
const COINMARKETCAP_PAGE_URL = 'https://coinmarketcap.com/currencies/phoenic/';
const COINMARKETCAP_PRICE_URL = 'https://api.coinmarketcap.com/data-api/v3/cryptocurrency/market-pairs/latest?slug=phoenic&start=1&limit=10&category=spot&centerType=all&sort=cmc_rank_advanced';
const COINMARKETCAP_PROXY_URL = `https://api.allorigins.win/raw?url=${encodeURIComponent(COINMARKETCAP_PRICE_URL)}`;
let currentPnicPrice = null;
let ethereumProvider = null;

function pickEthereumProvider() {
    if (window.ethereum?.isMetaMask) return window.ethereum;

    if (Array.isArray(window.ethereum?.providers)) {
        const metaMaskProvider = window.ethereum.providers.find((provider) => provider?.isMetaMask);
        if (metaMaskProvider) return metaMaskProvider;
    }

    return window.ethereum || null;
}

function getWalletErrorMessage() {
    if (window.location.protocol === 'file:') {
        return 'MetaMask is not available on this file URL. Open the page through a local web server or enable MetaMask extension access to file URLs in your browser extension settings.';
    }

    return 'MetaMask provider was not injected into this page. If you opened this in a VS Code preview or embedded browser, open it in Chrome or Edge instead.';
}

async function resolveEthereumProvider(timeout = 1500) {
    const existingProvider = pickEthereumProvider();
    if (existingProvider) {
        ethereumProvider = existingProvider;
        return ethereumProvider;
    }

    await new Promise((resolve) => {
        let settled = false;

        const finish = () => {
            if (settled) return;
            settled = true;
            window.removeEventListener('ethereum#initialized', finish);
            resolve();
        };

        window.addEventListener('ethereum#initialized', finish, { once: true });
        setTimeout(finish, timeout);
    });

    ethereumProvider = pickEthereumProvider();
    return ethereumProvider;
}

function updateUsdValue() {
    const pnicAmount = parseFloat(document.getElementById('pnicAmount').innerText);

    if (!Number.isFinite(pnicAmount) || !Number.isFinite(currentPnicPrice)) {
        document.getElementById('usdValue').innerText = 'USD value unavailable';
        return;
    }

    const usdValue = (pnicAmount * currentPnicPrice).toFixed(2);
    document.getElementById('usdValue').innerText = `$${usdValue} USD`;
}

async function fetchPnicPrice() {
    const priceDisplay = document.getElementById('pnicPriceDisplay');

    try {
        const response = await fetch(COINMARKETCAP_PROXY_URL);
        if (!response.ok) throw new Error(`Price request failed: ${response.status}`);

        const data = await response.json();
        currentPnicPrice = data?.data?.marketPairs?.[0]?.price ?? null;

        if (!Number.isFinite(currentPnicPrice)) {
            throw new Error('CoinMarketCap did not return a numeric price');
        }

        priceDisplay.href = COINMARKETCAP_PAGE_URL;
        priceDisplay.innerText = `PNIC: $${currentPnicPrice.toFixed(6)}`;
        updateUsdValue();
    } catch (e) {
        currentPnicPrice = null;
        priceDisplay.href = COINMARKETCAP_PAGE_URL;
        priceDisplay.innerText = 'PNIC: View on CoinMarketCap';
        updateUsdValue();
    }
}

async function handleInteraction() {
    const provider = await resolveEthereumProvider();

    if (!provider) {
        alert(getWalletErrorMessage());
        return;
    }

    try {
        const accounts = await provider.request({ method: 'eth_requestAccounts' });
        await switchToMiracle();
        const currentChainId = await provider.request({ method: 'eth_chainId' });
        
        if (currentChainId.toLowerCase() === MIRACLE_CHAIN_ID.toLowerCase()) {
            showSuccess(accounts[0]);
            fetchBalance(accounts[0]);
            fetchPnicPrice();
        }
    } catch (error) { console.error(error); }
}

async function switchToMiracle() {
    const provider = ethereumProvider || await resolveEthereumProvider();
    if (!provider) throw new Error(getWalletErrorMessage());

    try {
        await provider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: MIRACLE_CHAIN_ID }] });
    } catch (err) {
        if (err.code === 4902) {
            await provider.request({
                method: 'wallet_addEthereumChain',
                params: [{
                    chainId: MIRACLE_CHAIN_ID,
                    chainName: 'Miracle Chain Mainnet',
                    nativeCurrency: { name: 'PNIC', symbol: 'PNIC', decimals: 18 },
                    rpcUrls: ['https://miracle-rpc.calderachain.xyz/http'],
                    blockExplorerUrls: ['https://miracle-rpc.calderaexplorer.xyz/']
                }],
            });
        }
    }
}

function showSuccess(account) {
    document.getElementById('successBanner').style.display = 'block';
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').innerText = `Connected: ${account.substring(0,6)}...`;
    document.getElementById('mainBtn').innerText = 'Network Active ✓';
    document.getElementById('mainBtn').classList.add('success-state');
    document.getElementById('historyBtn').href = EXPLORER_URL + account;
    document.getElementById('historyBtn').style.display = 'block';
    document.getElementById('switchEthBtn').style.display = 'block';
}

async function fetchBalance(account) {
    const provider = ethereumProvider || await resolveEthereumProvider();
    if (!provider) throw new Error(getWalletErrorMessage());

    const balanceHex = await provider.request({ method: 'eth_getBalance', params: [account, 'latest'] });
    const pnic = (parseInt(balanceHex, 16) / 1e18).toFixed(4);
    document.getElementById('pnicAmount').innerText = pnic;
    document.getElementById('balanceCard').style.display = 'block';

    updateUsdValue();
}

async function switchToEthereum() {
    const provider = ethereumProvider || await resolveEthereumProvider();
    if (!provider) throw new Error(getWalletErrorMessage());

    await provider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x1' }] });
    location.reload();
}

resolveEthereumProvider(0);
</script>

</body>
</html>
